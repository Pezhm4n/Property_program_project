name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Configure CMake
      run: cmake -S core -B core/build

    - name: Build Core
      run: cmake --build core/build --config Release

    - name: Run CTest
      run: cd core/build && ctest -C Release --output-on-failure
      continue-on-error: true

    - name: Install Python Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ruff Linter
      run: ruff check app bridge
      continue-on-error: true

    - name: Run Pytest
      run: pytest app/tests bridge/tests
      continue-on-error: true
