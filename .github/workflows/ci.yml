name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcjson-dev libsqlite3-dev

    - name: Configure CMake
      run: cmake -S core -B core/build

    - name: Build Core
      run: cmake --build core/build --config Release

    - name: Install Python Requirements & Syntax Validation
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        ruff check app bridge

    - name: Run Tests
      run: |
        cd core/build
        ctest -C Release --output-on-failure
        cd ../../
        pytest app/tests bridge/tests
      continue-on-error: true
