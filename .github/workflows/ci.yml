name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcjson-dev libsqlite3-dev libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 x11-utils xvfb

    - name: Install Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        vcpkg install sqlite3 cjson --triplet x64-windows

    - name: Configure CMake
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cmake -S core -B core/build -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
        else
          cmake -S core -B core/build
        fi
      shell: bash

    - name: Build Core
      run: cmake --build core/build --config Release

    - name: Install Python Requirements & Syntax Validation
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        ruff check app bridge

    - name: Run Tests
      run: |
        cd core/build
        ctest -C Release --output-on-failure
        cd ../../
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          xvfb-run pytest app/tests bridge/tests
        else
          pytest app/tests bridge/tests
        fi
      shell: bash
